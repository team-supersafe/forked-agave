name: Sync Upstream Tags

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:

jobs:
  sync-tags:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/anza-xyz/agave.git
          git fetch upstream --tags

      - name: Sync new tags
        run: |
          # Get all tags from upstream
          git fetch upstream --tags
          
          echo "=== Debug Info ==="
          echo "Local tags count: $(git tag -l | wc -l)"
          echo "Upstream tags count: $(git ls-remote --tags upstream | grep -v '\^{}$' | wc -l)"
          echo "Filtered tags (>=v2.2.0) count: $(git ls-remote --tags upstream | sed 's|.*refs/tags/||' | grep -v '\^{}$' | grep -E '^v2\.[2-9]|^v[3-9]' | wc -l)"
          echo "First 5 filtered tags: $(git ls-remote --tags upstream | sed 's|.*refs/tags/||' | grep -v '\^{}$' | grep -E '^v2\.[2-9]|^v[3-9]' | head -5 | tr '\n' ' ')"
          echo "=================="
          
          # Get list of tags that exist upstream but not in our fork
          # Filter out peeled tags (^{} suffix), get unique tag names, and only v2.2+ tags
          for tag in $(git ls-remote --tags upstream | sed 's|.*refs/tags/||' | grep -v '\^{}$' | grep -E '^v2\.[2-9]|^v[3-9]' | sort -u); do
            echo "Checking tag: $tag"
            if ! git tag -l | grep -q "^$tag$"; then
              echo "Syncing tag: $tag"
              git fetch upstream tag $tag
              git tag $tag upstream/$tag
              git push origin $tag
              
              # Create GitHub Release for the new tag
              echo "Creating release for tag: $tag"
              gh release create "$tag" --title "Release $tag" --notes "Mirrored from upstream anza-xyz/agave" --repo team-supersafe/forked-agave
            else
              echo "Tag $tag already exists locally"
            fi
          done
